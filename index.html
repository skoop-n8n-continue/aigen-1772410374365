<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Hello World - Digital Signage</title>
    <script>
        // Dynamic cache busting for main script and styles
        (function() {
            const timestamp = Date.now();
            
            // Script loading
            const script = document.createElement('script');
            script.src = `script.js?v=${timestamp}`;
            document.head.appendChild(script);

            // Style loading
            const style = document.createElement('link');
            style.rel = 'stylesheet';
            style.href = `style.css?v=${timestamp}`;
            document.head.appendChild(style);
        })();
    </script>
</head>
<body>
    <div class="container">
        <h1 class="hello-text">Hello World</h1>
        <p class="sub-text">Digital Signage App Running</p>
    </div>
</body>
</html>
